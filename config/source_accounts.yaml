# 業界動向ソースのキュレーション allowlist（叩き台 / 自由に追加・削除してください）
#
# 使い方:
#   - fetch_search.py --accounts-file がこれを読み、`from:<handle> -filter:replies`
#     で各アカウントの最近の投稿を取得（いいね数に関係なく拾う＝一次情報重視）。
#   - build_simple_digest.py --accounts-file が「信頼ソース加点」と
#     「品質加重モメンタム（ゾンビ群の水増し無効化）」に使用。
#
# handle は @ 抜きのスクリーンネーム（大小無視）。実在性・最新ハンドルは要確認。
# count: 1アカウントあたりの取得目標（少なめでOK。--max-age-hours でさらにカット）。

defaults:
  count: 15

