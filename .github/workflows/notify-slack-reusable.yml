# Reusable Slack notification.
# Call from another workflow:
#   jobs:
#     notify:
#       uses: ./.github/workflows/notify-slack-reusable.yml
#       secrets: inherit
# Requires repo secret SLACK_WEBHOOK_URL (Slack Incoming Webhook). No-op when unset.
name: Notify Slack (Reusable)

on:
  workflow_call:
    inputs:
      custom_text:
        description: 'Header line; overrides the default "<repo> (<branch>) — <event> by <actor>" context. The run link is always appended.'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CUSTOM: ${{ inputs.custom_text }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi
          if [ -n "$CUSTOM" ]; then
            HEADER="$CUSTOM"
          else
            HEADER="*${REPO}* (\`${BRANCH}\`) — ${EVENT} by ${ACTOR}"
            if [ -n "$COMMIT_MSG" ]; then
              FIRST_LINE="${COMMIT_MSG%%$'\n'*}"
              HEADER="${HEADER}"$'\n'"> ${FIRST_LINE}"
            fi
          fi
          MSG="${HEADER}"$'\n'"<${RUN_URL}|View run>"
          printf '%s' "$MSG" > /tmp/slack_msg.txt
          payload=$(jq -n --rawfile m /tmp/slack_msg.txt '{text: ("<@U09G73WQYJ0> " + $m)}')
          curl -s -X POST -H "Content-Type: application/json" -d "$payload" "$SLACK_WEBHOOK_URL"
