name: CI
on:
  push:
    branches-ignore: ['wip/checkpoint/**']
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m compileall -q scripts
  notify-failure:
    needs: ci
    if: failure()
    uses: ./.github/workflows/notify-slack-reusable.yml
    with:
      custom_text: ":x: CI failed on `${{ github.ref_name }}` — ${{ github.repository }}"
    secrets: inherit
