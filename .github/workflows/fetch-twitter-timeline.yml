# Xの暗号資産「業界動向」を取得 → 日本語訳 → Discord 投稿
# 取得は2系統: (1) 信頼ソース allowlist の from:<handle>（config/source_accounts.yaml、主軸）
#             (2) キーワード+filter:links の発見用検索（config/search_queries.yaml）
# digest は信頼性スコア順＋品質加重モメンタムで構成し、Anthropic API で日本語化（失敗時は英語）。
name: Fetch Twitter Timeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # 毎日 0:00 UTC = 9:00 JST

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python deps
        run: pip install pyyaml

      - name: Fetch crypto search results
        id: fetch
        continue-on-error: true
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_SEARCH_QUERY_ID: ${{ secrets.X_SEARCH_QUERY_ID }}
        run: |
          mkdir -p data
          python3 scripts/fetch_search.py \
            --queries-file config/search_queries.yaml \
            --accounts-file config/source_accounts.yaml \
            --max-age-hours 48 \
            --output data/tweets.json

      - name: Check fetch result
        id: check
        run: |
          if [ ! -f data/tweets.json ]; then
            echo "status=no_file" >> "$GITHUB_OUTPUT"
          else
            count=$(python3 -c "import json; print(len(json.load(open('data/tweets.json'))))")
            echo "tweet_count=$count" >> "$GITHUB_OUTPUT"
            if [ "$count" -eq 0 ]; then
              echo "status=empty" >> "$GITHUB_OUTPUT"
            else
              echo "status=ok" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Notify token expiry
        if: steps.fetch.outcome == 'failure' || steps.check.outputs.status != 'ok'
        env:
          DISCORD_BRIDGE_URL: ${{ secrets.DISCORD_BRIDGE_URL }}
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          FETCH_OUTCOME="${{ steps.fetch.outcome }}"
          MSG="⚠️ Twitter Digest パイプライン失敗\n\n"
          MSG+="fetch結果: ${FETCH_OUTCOME}\n"
          MSG+="ステータス: ${STATUS}\n\n"
          MSG+="X_AUTH_TOKEN / X_CT0 が期限切れの可能性があります。\n"
          MSG+="モバイルブラウザで x.com → Cookie から再取得し、GitHub Secrets を更新してください。"
          python3 -c "
          import json
          payload = {'title': '⚠️ Token期限切れ通知', 'content': '''$MSG'''}
          with open('/tmp/alert.json', 'w') as f:
              json.dump(payload, f, ensure_ascii=False)
          "
          curl -sS -X POST -H "Content-Type: application/json" \
            -d @/tmp/alert.json "$DISCORD_BRIDGE_URL"

      - name: Exit if fetch failed
        if: steps.check.outputs.status != 'ok'
        run: |
          echo "Fetch failed or returned 0 tweets. Skipping pipeline."
          exit 1

      - name: Extract topics (force crypto)
        run: |
          python3 scripts/extract_topics.py \
            data/tweets.json \
            --output data/enriched.json \
            --force-topic crypto

      - name: Filter promotional content
        run: |
          python3 scripts/filter_promotional.py \
            data/enriched.json \
            --output data/filtered.json \
            --stats

      - name: Cluster tweets
        run: |
          mkdir -p data/clusters
          python3 scripts/cluster_and_summarize.py \
            data/filtered.json \
            --output data/clusters

      - name: Build digest
        run: |
          python3 scripts/build_simple_digest.py \
            data/filtered.json \
            --accounts-file config/source_accounts.yaml \
            --output data/digest.md \
            --title "Crypto Digest (X Search)"

      - name: Translate digest to Japanese
        id: translate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/translate_digest.py \
            data/digest.md \
            --output data/digest.ja.md

      - name: Post to Discord
        env:
          DISCORD_BRIDGE_URL: ${{ secrets.DISCORD_BRIDGE_URL }}
        run: |
          DIGEST=data/digest.ja.md
          TITLE="暗号通貨ダイジェスト（X検索）"
          if [ ! -s "$DIGEST" ]; then
            echo "Japanese digest missing/empty; falling back to English digest."
            DIGEST=data/digest.md
            TITLE="Crypto Digest (X Search)"
          fi
          rm -rf /tmp/chunks && mkdir -p /tmp/chunks
          DIGEST="$DIGEST" TITLE="$TITLE" python3 - <<'PY'
          import json, os
          text = open(os.environ['DIGEST'], encoding='utf-8').read()
          title = os.environ['TITLE']
          MAX = 3500  # bridge truncates each post at 4000; keep margin
          chunks, cur = [], ""
          for line in text.split("\n"):
              while len(line) > MAX:
                  if cur:
                      chunks.append(cur); cur = ""
                  chunks.append(line[:MAX]); line = line[MAX:]
              if cur and len(cur) + 1 + len(line) > MAX:
                  chunks.append(cur); cur = line
              else:
                  cur = (cur + "\n" + line) if cur else line
          if cur.strip():
              chunks.append(cur)
          chunks = [c for c in chunks if c.strip()]
          n = len(chunks)
          for i, c in enumerate(chunks, 1):
              suffix = f" ({i}/{n})" if n > 1 else ""
              with open(f"/tmp/chunks/{i:03d}.json", "w", encoding="utf-8") as out:
                  json.dump({"title": title + suffix, "content": c}, out, ensure_ascii=False)
          print(f"prepared {n} chunk(s) from {os.environ['DIGEST']}")
          PY
          shopt -s nullglob
          for f in /tmp/chunks/*.json; do
            curl -sS -X POST -H "Content-Type: application/json" -d @"$f" "$DISCORD_BRIDGE_URL"
            echo
            sleep 1.5
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twitter-digest
          if-no-files-found: ignore
          path: |
            data/tweets.json
            data/filtered.json
            data/digest.md
            data/digest.ja.md
