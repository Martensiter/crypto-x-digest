# Secret scanning with gitleaks. Runs the MIT-licensed gitleaks binary
# directly (no Action/license gate) over the WORKING TREE (--no-git) so it
# blocks newly-introduced secrets without failing on anything already in
# history. Pinned version for reproducibility.
name: secret-scan

on:
  push:
    branches-ignore:
      - 'wip/checkpoint/**'
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks (working tree)
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --no-git --redact --exit-code 1 --verbose
